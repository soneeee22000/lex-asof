name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Tests run against a real PostgreSQL. The as-of filter and the ranking both depend on
      # PostgreSQL full-text search — testing against SQLite would exercise a different query
      # than the one that ships, so the suite could pass while the system was broken.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: lex
          POSTGRES_PASSWORD: lex
          POSTGRES_DB: lex
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U lex"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql+psycopg://lex:lex@localhost:5433/lex
      TEST_DATABASE_URL: postgresql+psycopg://lex:lex@localhost:5433/lex

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests eval scripts

      - name: Typecheck
        run: mypy app

      - name: Test
        run: pytest -q

      # The eval gate is a release blocker, not a report. Citation accuracy below 80%, or a
      # single hallucinated answer where the system should have refused, fails the build.
      # Refusal correctness is gated at 100%: inventing law is never an acceptable regression.
      - name: Evaluation gate
        run: python -m eval.golden

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
